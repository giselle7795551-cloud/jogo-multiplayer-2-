<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARENA — Multiplayer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --p1: #00d4ff;
      --p2: #ff3c6e;
      --bg: #07090f;
      --grid: rgba(255,255,255,0.03);
      --glow1: rgba(0,212,255,0.4);
      --glow2: rgba(255,60,110,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: white;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
    }

    .player-card.p2 { align-items: flex-end; }

    .player-name {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .p1 .player-name { color: var(--p1); text-shadow: 0 0 12px var(--p1); }
    .p2 .player-name { color: var(--p2); text-shadow: 0 0 12px var(--p2); }

    .health-bar-bg {
      width: 180px;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .health-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    .p1 .health-bar-fill { background: linear-gradient(90deg, var(--p1), #7df9ff); box-shadow: 0 0 8px var(--p1); }
    .p2 .health-bar-fill { background: linear-gradient(90deg, var(--p2), #ff9fb3); box-shadow: 0 0 8px var(--p2); }

    .health-text {
      font-size: 11px;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    .score-badge {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
    }

    .p1 .score-badge { color: var(--p1); text-shadow: 0 0 20px var(--p1); }
    .p2 .score-badge { color: var(--p2); text-shadow: 0 0 20px var(--p2); }

    /* center HUD */
    .center-hud {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      letter-spacing: 4px;
    }

    .vs-badge {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.25);
    }

    /* ── Controls hint ── */
    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      z-index: 10;
      pointer-events: none;
    }

    .ctrl-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.35;
    }

    .ctrl-block .keys { font-family: 'Orbitron', monospace; font-size: 12px; }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(7,9,15,0.85);
      backdrop-filter: blur(8px);
      z-index: 20;
      gap: 20px;
      transition: opacity 0.4s;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 64px);
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(0,212,255,0.4));
    }

    #overlay p {
      font-size: 14px;
      letter-spacing: 3px;
      opacity: 0.5;
      text-transform: uppercase;
    }

    #start-btn {
      margin-top: 16px;
      padding: 14px 48px;
      background: transparent;
      border: 2px solid var(--p1);
      color: var(--p1);
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      box-shadow: 0 0 20px var(--glow1), inset 0 0 20px rgba(0,212,255,0.05);
      transition: all 0.2s;
    }

    #start-btn:hover {
      background: rgba(0,212,255,0.1);
      box-shadow: 0 0 40px var(--glow1), inset 0 0 30px rgba(0,212,255,0.1);
      transform: scale(1.03);
    }

    /* ── Winner message ── */
    #winner-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(20px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #winner-msg.show { opacity: 1; }

    /* ── Particle canvas ── */
    #bg-canvas { z-index: 0; }
    #game-canvas { z-index: 1; }

    /* ── Collectible counter ── */
    .gems {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      letter-spacing: 2px;
    }
    .p1 .gems { color: var(--p1); }
    .p2 .gems { color: var(--p2); }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .timer.danger { color: var(--p2); animation: pulse-red 0.5s infinite; }
  </style>
</head>
<body tabindex="0" style="outline:none">

<!-- Background canvas -->
<canvas id="bg-canvas"></canvas>
<!-- Game canvas -->
<canvas id="game-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="player-card p1">
    <div class="player-name">Jogador 1</div>
    <div class="health-bar-bg">
      <div class="health-bar-fill" id="hp1" style="width:100%"></div>
    </div>
    <div class="health-text">HP: <span id="hp1-text">100</span></div>
    <div class="gems">💎 <span id="gems1">0</span></div>
  </div>

  <div class="center-hud">
    <div class="timer" id="timer">60</div>
    <div class="vs-badge">VS</div>
    <div style="display:flex;gap:24px">
      <div class="score-badge p1"><span id="score1">0</span></div>
      <div style="opacity:0.2;font-family:Orbitron;font-size:18px;align-self:center">:</div>
      <div class="score-badge p2"><span id="score2">0</span></div>
    </div>
  </div>

  <div class="player-card p2">
    <div class="player-name">Jogador 2</div>
    <div class="health-bar-bg">
      <div class="health-bar-fill" id="hp2" style="width:100%"></div>
    </div>
    <div class="health-text">HP: <span id="hp2-text">100</span></div>
    <div class="gems">💎 <span id="gems2">0</span></div>
  </div>
</div>

<!-- Winner -->
<div id="winner-msg"></div>

<!-- Controls hint -->
<div id="controls">
  <div class="ctrl-block">
    <div class="keys">W A S D</div>
    <div>Jogador 1 — Mover</div>
  </div>
  <div class="ctrl-block">
    <div class="keys">↑ ← ↓ →</div>
    <div>Jogador 2 — Mover</div>
  </div>
</div>

<!-- Intro Overlay -->
<div id="overlay">
  <h1>ARENA</h1>
  <p>Multiplayer Local — 2 Jogadores</p>
  <button id="start-btn" onclick="startGame()">▶ INICIAR</button>
</div>

<script>
/* ═══════════════════════════════════════
   SETUP
═══════════════════════════════════════ */
const bgCanvas = document.getElementById("bg-canvas");
const bgCtx = bgCanvas.getContext("2d");
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");

function resize() {
  bgCanvas.width = canvas.width = window.innerWidth;
  bgCanvas.height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ═══════════════════════════════════════
   BACKGROUND GRID + STARS
═══════════════════════════════════════ */
const stars = Array.from({length:120}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.5 + 0.2,
  a: Math.random(),
  speed: Math.random() * 0.3 + 0.1
}));

function drawBackground() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Grid
  bgCtx.strokeStyle = "rgba(255,255,255,0.03)";
  bgCtx.lineWidth = 1;
  const gs = 60;
  for (let x = 0; x < bgCanvas.width; x += gs) {
    bgCtx.beginPath();
    bgCtx.moveTo(x, 0);
    bgCtx.lineTo(x, bgCanvas.height);
    bgCtx.stroke();
  }
  for (let y = 0; y < bgCanvas.height; y += gs) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y);
    bgCtx.lineTo(bgCanvas.width, y);
    bgCtx.stroke();
  }

  // Stars
  stars.forEach(s => {
    s.a += 0.005 * s.speed;
    const alpha = (Math.sin(s.a) + 1) / 2 * 0.6 + 0.1;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    bgCtx.fill();
  });
}

/* ═══════════════════════════════════════
   PARTICLES
═══════════════════════════════════════ */
const particles = [];

function spawnParticles(x, y, color, count=10) {
  for(let i=0; i<count; i++) {
    const angle = Math.random() * Math.PI*2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      decay: Math.random()*0.03+0.02,
      r: Math.random()*4+2,
      color
    });
  }
}

function updateParticles() {
  for(let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if(p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ═══════════════════════════════════════
   COLLECTIBLES (GEMS)
═══════════════════════════════════════ */
const gems = [];
let gemTimer = 0;

function spawnGem() {
  gems.push({
    x: 80 + Math.random() * (canvas.width - 160),
    y: 80 + Math.random() * (canvas.height - 160),
    r: 10,
    pulse: Math.random() * Math.PI*2,
    color: ["#ffd700","#a855f7","#22d3ee","#4ade80"][Math.floor(Math.random()*4)]
  });
}

function drawGems() {
  gems.forEach(g => {
    g.pulse += 0.07;
    const scale = 1 + Math.sin(g.pulse) * 0.15;
    const glow = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r*2*scale);
    glow.addColorStop(0, g.color);
    glow.addColorStop(1, "transparent");
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r*3*scale, 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Diamond shape
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(Math.PI/4 + g.pulse*0.1);
    ctx.scale(scale, scale);
    ctx.fillStyle = g.color;
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 12;
    ctx.fillRect(-g.r*0.7, -g.r*0.7, g.r*1.4, g.r*1.4);
    ctx.restore();
    ctx.shadowBlur = 0;
  });
}

/* ═══════════════════════════════════════
   DASH EFFECT TRAILS
═══════════════════════════════════════ */
const trails = [];

function addTrail(player) {
  trails.push({
    x: player.x, y: player.y,
    size: player.size,
    color: player.color,
    life: 1
  });
}

function drawTrails() {
  for(let i = trails.length-1; i >= 0; i--) {
    const t = trails[i];
    t.life -= 0.08;
    if(t.life <= 0) { trails.splice(i, 1); continue; }
    ctx.globalAlpha = t.life * 0.35;
    ctx.fillStyle = t.color;
    const s = t.size * t.life;
    const off = (t.size - s) / 2;
    ctx.fillRect(t.x + off, t.y + off, s, s);
  }
  ctx.globalAlpha = 1;
}

/* ═══════════════════════════════════════
   PLAYERS
═══════════════════════════════════════ */
let p1, p2;

function initPlayers() {
  p1 = {
    x: 120, y: canvas.height/2 - 20,
    size: 40, color: "#00d4ff",
    speed: 5, hp: 100, gems: 0,
    knockX: 0, knockY: 0,
    hitFlash: 0
  };
  p2 = {
    x: canvas.width - 160, y: canvas.height/2 - 20,
    size: 40, color: "#ff3c6e",
    speed: 5, hp: 100, gems: 0,
    knockX: 0, knockY: 0,
    hitFlash: 0
  };
}

const keys = {};

window.addEventListener("keydown", e => {
  keys[e.key] = true;
  keys[e.key.toLowerCase()] = true;
  // Prevent arrow keys from scrolling
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
}, true);

window.addEventListener("keyup", e => {
  keys[e.key] = false;
  keys[e.key.toLowerCase()] = false;
}, true);

function movePlayers() {
  // Player 1 — WASD (lowercase, independente de CapsLock)
  let dx1=0, dy1=0;
  if(keys["w"] || keys["W"]) dy1 -= 1;
  if(keys["s"] || keys["S"]) dy1 += 1;
  if(keys["a"] || keys["A"]) dx1 -= 1;
  if(keys["d"] || keys["D"]) dx1 += 1;

  // Player 2 — Arrows
  let dx2=0, dy2=0;
  if(keys["ArrowUp"])    dy2 -= 1;
  if(keys["ArrowDown"])  dy2 += 1;
  if(keys["ArrowLeft"])  dx2 -= 1;
  if(keys["ArrowRight"]) dx2 += 1;

  // Normalize diagonal
  const len1 = Math.hypot(dx1, dy1) || 1;
  const len2 = Math.hypot(dx2, dy2) || 1;

  if(dx1||dy1) { addTrail(p1); }
  if(dx2||dy2) { addTrail(p2); }

  p1.x += (dx1/len1) * p1.speed + p1.knockX;
  p1.y += (dy1/len1) * p1.speed + p1.knockY;
  p2.x += (dx2/len2) * p2.speed + p2.knockX;
  p2.y += (dy2/len2) * p2.speed + p2.knockY;

  p1.knockX *= 0.8; p1.knockY *= 0.8;
  p2.knockX *= 0.8; p2.knockY *= 0.8;
  if(Math.abs(p1.knockX)<0.1) p1.knockX=0;
  if(Math.abs(p1.knockY)<0.1) p1.knockY=0;
  if(Math.abs(p2.knockX)<0.1) p2.knockX=0;
  if(Math.abs(p2.knockY)<0.1) p2.knockY=0;

  // Bounds
  const pad = 60;
  p1.x = Math.max(0, Math.min(canvas.width  - p1.size, p1.x));
  p1.y = Math.max(pad, Math.min(canvas.height - p1.size, p1.y));
  p2.x = Math.max(0, Math.min(canvas.width  - p2.size, p2.x));
  p2.y = Math.max(pad, Math.min(canvas.height - p2.size, p2.y));
}

function drawPlayer(p, label) {
  const cx = p.x + p.size/2;
  const cy = p.y + p.size/2;

  // Outer glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, p.size*1.4);
  grd.addColorStop(0, p.color + "55");
  grd.addColorStop(1, "transparent");
  ctx.beginPath();
  ctx.arc(cx, cy, p.size*1.4, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Hexagon body
  ctx.save();
  ctx.translate(cx, cy);
  if(p.hitFlash > 0) {
    ctx.fillStyle = "#ffffff";
    p.hitFlash--;
  } else {
    ctx.fillStyle = p.color;
  }
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 20;
  hexPath(ctx, 0, 0, p.size/2 + 2);
  ctx.fill();

  // Inner hex darker
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  hexPath(ctx, 0, 0, p.size/2 - 8);
  ctx.fill();

  // Label
  ctx.fillStyle = "white";
  ctx.font = `bold 13px Orbitron, monospace`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(label, 0, 0);

  ctx.restore();
  ctx.shadowBlur = 0;
}

function hexPath(ctx, cx, cy, r) {
  ctx.beginPath();
  for(let i=0; i<6; i++) {
    const a = (Math.PI/3)*i - Math.PI/6;
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
}

/* ═══════════════════════════════════════
   COLLISION & COMBAT
═══════════════════════════════════════ */
let collisionCooldown = 0;

function checkCollision() {
  const dx = (p1.x+p1.size/2) - (p2.x+p2.size/2);
  const dy = (p1.y+p1.size/2) - (p2.y+p2.size/2);
  const dist = Math.hypot(dx, dy);
  const minDist = (p1.size/2 + p2.size/2) * 0.85;

  if(dist < minDist && collisionCooldown <= 0) {
    // Knockback
    const nx = dx/dist, ny = dy/dist;
    const force = 12;
    p1.knockX += nx * force;
    p1.knockY += ny * force;
    p2.knockX -= nx * force;
    p2.knockY -= ny * force;

    // Damage
    p1.hp = Math.max(0, p1.hp - 8);
    p2.hp = Math.max(0, p2.hp - 8);
    p1.hitFlash = 5;
    p2.hitFlash = 5;

    spawnParticles((p1.x+p2.x)/2+p1.size/2, (p1.y+p2.y)/2+p1.size/2, "#ffffff", 15);
    collisionCooldown = 20;
    updateHUD();
  }
  if(collisionCooldown > 0) collisionCooldown--;
}

function checkGems() {
  for(let i = gems.length-1; i >= 0; i--) {
    const g = gems[i];
    [p1, p2].forEach((p, idx) => {
      const cx = p.x + p.size/2;
      const cy = p.y + p.size/2;
      if(Math.hypot(cx-g.x, cy-g.y) < p.size/2 + g.r) {
        spawnParticles(g.x, g.y, g.color, 12);
        if(idx===0) p1.gems++;
        else p2.gems++;
        gems.splice(i, 1);
        updateHUD();
      }
    });
  }
}

/* ═══════════════════════════════════════
   ARENA WALLS (obstacles)
═══════════════════════════════════════ */
const walls = [];

function initWalls() {
  walls.length = 0;
  const cw = canvas.width, ch = canvas.height;
  walls.push(
    { x: cw/2-40, y: ch/2-100, w: 80, h: 200 },
    { x: cw/4-30, y: ch*0.3, w: 60, h: 60 },
    { x: cw*3/4-30, y: ch*0.6, w: 60, h: 60 },
  );
}

function drawWalls() {
  walls.forEach(wall => {
    const grd = ctx.createLinearGradient(wall.x, wall.y, wall.x+wall.w, wall.y+wall.h);
    grd.addColorStop(0, "rgba(100,120,180,0.3)");
    grd.addColorStop(1, "rgba(60,80,140,0.1)");
    ctx.fillStyle = grd;
    ctx.strokeStyle = "rgba(150,180,255,0.25)";
    ctx.lineWidth = 1.5;
    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
    ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);

    // top highlight
    ctx.fillStyle = "rgba(200,220,255,0.06)";
    ctx.fillRect(wall.x, wall.y, wall.w, 3);
  });
}

function resolveWallCollisions(p) {
  walls.forEach(wall => {
    if(p.x < wall.x+wall.w && p.x+p.size > wall.x &&
       p.y < wall.y+wall.h && p.y+p.size > wall.y) {
      // Push out
      const overlapL = (p.x+p.size) - wall.x;
      const overlapR = (wall.x+wall.w) - p.x;
      const overlapT = (p.y+p.size) - wall.y;
      const overlapB = (wall.y+wall.h) - p.y;
      const min = Math.min(overlapL, overlapR, overlapT, overlapB);
      if(min === overlapL) p.x = wall.x - p.size;
      else if(min === overlapR) p.x = wall.x + wall.w;
      else if(min === overlapT) p.y = wall.y - p.size;
      else p.y = wall.y + wall.h;
    }
  });
}

/* ═══════════════════════════════════════
   HUD UPDATE
═══════════════════════════════════════ */
function updateHUD() {
  document.getElementById("hp1").style.width = p1.hp + "%";
  document.getElementById("hp2").style.width = p2.hp + "%";
  document.getElementById("hp1-text").textContent = p1.hp;
  document.getElementById("hp2-text").textContent = p2.hp;
  document.getElementById("gems1").textContent = p1.gems;
  document.getElementById("gems2").textContent = p2.gems;
}

/* ═══════════════════════════════════════
   TIMER & SCORE
═══════════════════════════════════════ */
let score1 = 0, score2 = 0;
let timeLeft = 60;
let lastTick = 0;
let gameRunning = false;
let roundOver = false;

function updateScoreDisplay() {
  document.getElementById("score1").textContent = score1;
  document.getElementById("score2").textContent = score2;
}

function endRound(winner) {
  roundOver = true;
  const msg = document.getElementById("winner-msg");
  if(winner === 1) {
    score1++;
    msg.style.color = "#00d4ff";
    msg.textContent = "JOGADOR 1 VENCEU!";
  } else if(winner === 2) {
    score2++;
    msg.style.color = "#ff3c6e";
    msg.textContent = "JOGADOR 2 VENCEU!";
  } else {
    msg.style.color = "#ffd700";
    msg.textContent = "EMPATE!";
  }
  updateScoreDisplay();
  msg.classList.add("show");
  setTimeout(() => {
    msg.classList.remove("show");
    if(score1 < 3 && score2 < 3) {
      resetRound();
    } else {
      showEndGame();
    }
  }, 2500);
}

function resetRound() {
  initPlayers();
  initWalls();
  gems.length = 0;
  particles.length = 0;
  trails.length = 0;
  timeLeft = 60;
  lastTick = 0;
  collisionCooldown = 0;
  roundOver = false;
  updateHUD();
}

function showEndGame() {
  const overlay = document.getElementById("overlay");
  overlay.querySelector("h1").textContent = score1 >= 3 ? "J1 CAMPEÃO" : "J2 CAMPEÃO";
  overlay.querySelector("p").textContent = `Placar Final: ${score1} × ${score2}`;
  const btn = document.getElementById("start-btn");
  btn.textContent = "▶ JOGAR DE NOVO";
  score1 = 0; score2 = 0;
  overlay.classList.remove("hidden");
  gameRunning = false;
}

function startGame() {
  document.getElementById("overlay").classList.add("hidden");
  document.body.focus();
  initPlayers();
  initWalls();
  updateHUD();
  updateScoreDisplay();
  gems.length = 0;
  particles.length = 0;
  trails.length = 0;
  timeLeft = 60;
  lastTick = 0;
  collisionCooldown = 0;
  roundOver = false;
  gameRunning = true;
}

/* ═══════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════ */
let prevTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  drawBackground();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if(!gameRunning) return;

  // Timer
  if(!roundOver) {
    if(ts - lastTick >= 1000) {
      timeLeft--;
      lastTick = ts;
      const timerEl = document.getElementById("timer");
      timerEl.textContent = timeLeft;
      timerEl.classList.toggle("danger", timeLeft <= 10);
      if(timeLeft <= 0) {
        if(p1.hp > p2.hp) endRound(1);
        else if(p2.hp > p1.hp) endRound(2);
        else {
          // Tiebreak by gems
          if(p1.gems > p2.gems) endRound(1);
          else if(p2.gems > p1.gems) endRound(2);
          else endRound(0);
        }
      }
    }

    // Spawn gem
    gemTimer++;
    if(gemTimer >= 180 && gems.length < 6) {
      spawnGem();
      gemTimer = 0;
    }

    movePlayers();
    resolveWallCollisions(p1);
    resolveWallCollisions(p2);
    checkCollision();
    checkGems();

    // Auto-death
    if(p1.hp <= 0 && !roundOver) endRound(2);
    else if(p2.hp <= 0 && !roundOver) endRound(1);
  }

  drawWalls();
  drawGems();
  drawTrails();
  updateParticles();
  drawPlayer(p1, "1");
  drawPlayer(p2, "2");
}

requestAnimationFrame(gameLoop);
</script>
